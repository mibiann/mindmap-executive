const SoundManager = {

  playClick() { this._tone(800,0.08,'sine',0.08); },
  playCorrect() { this._tone(523,0.15,'sine',0.12); setTimeout(()=>this._tone(784,0.2,'sine',0.12),120); },
  playWrong() { this._tone(330,0.15,'sine',0.08); setTimeout(()=>this._tone(262,0.2,'sine',0.08),120); },
  playComplete() { [523,659,784,1047].forEach((f,i)=>{ setTimeout(()=>this._tone(f,0.25,'sine',0.1),i*100); }); },

  toggleSfx() { this.sfxEnabled=!this.sfxEnabled; localStorage.setItem('mm-sfx',this.sfxEnabled); if(this.sfxEnabled) this.playClick(); return this.sfxEnabled; }
};

function Button({ children, onClick, variant='primary', size='md', disabled=false, className='' }) {
  const base = 'font-bold rounded-xl transition-all duration-200 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed ';
  const variants = { primary:'bg-gradient-to-r from-bee-500 to-bee-600 text-white hover:shadow-lg hover:shadow-bee-500/25', secondary:'bg-gradient-to-r from-ocean-500 to-ocean-600 text-white hover:shadow-lg hover:shadow-ocean-500/25', outline:'border-2 border-bee-500 text-bee-700 hover:bg-bee-50', ghost:'text-gray-600 hover:bg-gray-100', success:'bg-gradient-to-r from-mint-500 to-mint-600 text-white hover:shadow-lg hover:shadow-mint-500/25', danger:'bg-gradient-to-r from-coral-400 to-coral-500 text-white' };
  const sizes = { sm:'px-3 py-1.5 text-sm', md:'px-5 py-2.5 text-base', lg:'px-7 py-3.5 text-lg' };
  return <button className={`${base}${variants[variant]||variants.primary} ${sizes[size]||sizes.md} ${className}`} onClick={()=>{SoundManager.playClick();onClick&&onClick();}} disabled={disabled}>{children}</button>;
}

function ExerciseIdentify({ exercise, onComplete }) {
  const cats = exercise.items[0]?.answer==='linear' ? {a:'linear',b:'mindmap',aLabel:'📝 Tuyến tính',bLabel:'🧠 Mind Map'} : {a:'dung',b:'sai',aLabel:'✅ ĐÚNG chuẩn',bLabel:'❌ SAI chuẩn'};
  const [placed, setPlaced] = useState({});
  const [checked, setChecked] = useState(false);
  const items = exercise.items;
  const unplaced = items.filter(it=>!placed[it.id]);
  const aItems = items.filter(it=>placed[it.id]===cats.a);
  const bItems = items.filter(it=>placed[it.id]===cats.b);
  const score = checked ? items.filter(it=>placed[it.id]===it.answer).length : 0;
  const handleDrop = (id, cat) => { if(checked) return; setPlaced(p=>({...p,[id]:cat})); };
  return (
    <div className="fade-in">
      <h3 className="font-bold text-lg text-gray-800 mb-1">{exercise.title}</h3>
      <p className="text-sm text-gray-500 mb-4">{exercise.instructions}</p>
      {/* Unplaced */}
      {unplaced.length>0 && <div className="mb-4"><p className="text-xs font-bold text-gray-500 mb-2">Kéo/bấm vào mỗi thẻ:</p><div className="space-y-2">{unplaced.map(it=>(
        <div key={it.id} className="bg-bee-50 border-2 border-bee-200 rounded-lg p-3 text-sm text-gray-800 flex gap-2">
          <span className="flex-1">{it.text}</span>
          <div className="flex gap-1 flex-shrink-0">
            <button onClick={()=>handleDrop(it.id,cats.a)} className="px-2 py-1 text-xs rounded bg-blue-100 text-blue-700 hover:bg-blue-200 font-bold">{cats.aLabel.split(' ')[0]}</button>
            <button onClick={()=>handleDrop(it.id,cats.b)} className="px-2 py-1 text-xs rounded bg-orange-100 text-orange-700 hover:bg-orange-200 font-bold">{cats.bLabel.split(' ')[0]}</button>
          </div>
        </div>
      ))}</div></div>}
      {/* Categories */}
      <div className="grid grid-cols-2 gap-3 mb-4">
        <div className="bg-blue-50 rounded-xl p-3 min-h-[80px] border-2 border-blue-200">
          <p className="text-xs font-bold text-blue-700 mb-2">{cats.aLabel}</p>
          {aItems.map(it=>(<div key={it.id} className={`text-xs p-2 rounded mb-1 ${checked?(it.answer===cats.a?'bg-green-100 text-green-800':'bg-red-100 text-red-800'):'bg-white text-gray-700'}`}>{it.text}{checked&&it.answer!==cats.a&&' ✗'}</div>))}
        </div>
        <div className="bg-orange-50 rounded-xl p-3 min-h-[80px] border-2 border-orange-200">
          <p className="text-xs font-bold text-orange-700 mb-2">{cats.bLabel}</p>
          {bItems.map(it=>(<div key={it.id} className={`text-xs p-2 rounded mb-1 ${checked?(it.answer===cats.b?'bg-green-100 text-green-800':'bg-red-100 text-red-800'):'bg-white text-gray-700'}`}>{it.text}{checked&&it.answer!==cats.b&&' ✗'}</div>))}
        </div>
      </div>
      {!checked && Object.keys(placed).length===items.length && <Button onClick={()=>{setChecked(true);score===items.length?SoundManager.playCorrect():SoundManager.playWrong();}}>Kiểm tra kết quả</Button>}
      {checked && <div className="bg-white rounded-xl p-4 border"><p className="font-bold text-lg">{score}/{items.length} đúng {score===items.length?'🎉':'💪'}</p><Button className="mt-3" onClick={onComplete} variant="success">Tiếp tục →</Button></div>}
    </div>
  );
}

// QUIZ
// ============================================================
function Quiz({ assessment, onComplete }) {
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [results, setResults] = useState([]);
  const [showResult, setShowResult] = useState(false);
  const qs = assessment.questions;
  const q = qs[current];
  const totalCorrect = results.filter(r=>r).length;
  const score = Math.round((totalCorrect/qs.length)*100);

  const handleSelect = (idx) => {
    if(selected!==null) return;
    setSelected(idx);
    const correct = idx===q.correct;
    correct ? SoundManager.playCorrect() : SoundManager.playWrong();
    setResults(r=>[...r, correct]);
  };
  const handleNext = () => {
    if(current<qs.length-1) { setCurrent(c=>c+1); setSelected(null); }
    else { setShowResult(true); SoundManager.playComplete(); }
  };

  if(showResult) return (
    <div className="fade-in text-center py-6">
      <div className="text-5xl mb-3">{score>=80?'🎉':score>=60?'👍':'💪'}</div>
      <h3 className="text-2xl font-black text-gray-900 mb-1">Kết quả: {score}%</h3>
      <p className="text-gray-500 mb-1">{totalCorrect}/{qs.length} câu đúng</p>
      <p className="text-sm text-gray-400 mb-4">{score>=80?'Xuất sắc! Bạn nắm vững kiến thức.':score>=60?'Khá tốt! Ôn lại vài điểm nhé.':'Hãy đọc lại bài học và thử lại!'}</p>
      <Button onClick={()=>onComplete(score)} variant="success">Hoàn thành bài này ✅</Button>
    </div>
  );
  return (
    <div className="fade-in">
      <div className="flex justify-between items-center mb-4"><span className="text-sm font-bold text-gray-500">Câu {current+1}/{qs.length}</span><div className="flex gap-1">{qs.map((_,i)=>(<div key={i} className={`w-2.5 h-2.5 rounded-full ${i<results.length?(results[i]?'bg-mint-500':'bg-coral-400'):(i===current?'bg-bee-500':'bg-gray-200')}`}/>))}</div></div>
      <h3 className="font-bold text-gray-800 mb-4">{q.q}</h3>
      <div className="space-y-2">
        {q.opts.map((opt,idx)=>(
          <button key={idx} onClick={()=>handleSelect(idx)} className={`w-full text-left p-3 rounded-xl border-2 text-sm transition-all ${selected===null?'border-gray-200 hover:border-bee-400 bg-white':idx===q.correct?'border-mint-500 bg-green-50':selected===idx?'border-coral-400 bg-red-50':'border-gray-200 bg-white opacity-60'}`}>{opt}</button>
        ))}
      </div>
      {selected!==null && <div className="mt-4"><Button onClick={handleNext}>{current<qs.length-1?'Câu tiếp theo →':'Xem kết quả'}</Button></div>}
    </div>
  );
}

const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzFXNuehBg-s27NvBKN-hJ8nga9fHR6dWAAst4nv9edFdfts4cNKVuR2DbfG7tIDtuI/exec';

function sendToSheets(data) {
  if (!SHEETS_URL) return;
  try {
    fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).catch(() => {});
  } catch(e) {}
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [screen, setScreen] = useState('loading');
  const [userName, setUserName] = useState('');
  const [userEmail, setUserEmail] = useState('');
  const [level, setLevel] = useState(null);
  const [activeModule, setActiveModule] = useState(null);
  const [progress, setProgress] = useState({});
  const [sfxOn, setSfxOn] = useState(true);
  const [registeredAt, setRegisteredAt] = useState(null);
  const [urlParams, setUrlParams] = useState({name:'', email:''});

  // Load saved state OR read URL params
  useEffect(() => {
    // 1. Kiểm tra localStorage (người học quay lại)
    const saved = localStorage.getItem('mm-checkpoint');
    if (saved) {
      try {
        const d = JSON.parse(saved);
        if(d.userName) {
          setUserName(d.userName); setUserEmail(d.email||''); setLevel(d.level);
          setProgress(d.progress||{}); setRegisteredAt(d.registeredAt||null);
          setScreen('dashboard');
          return;
        }
      } catch(e) {}
    }

    // 2. Đọc URL params (từ LadiPage gửi qua email)
    const params = new URLSearchParams(window.location.search);
    const cleanParam = (v) => (v && /\{\{.*\}\}|\*\|.*\|\*/.test(v)) ? '' : (v || '');
    const pName = cleanParam(params.get('name'));
    const pEmail = cleanParam(params.get('email'));
    setUrlParams({name: pName, email: pEmail});

    if (pName && pEmail) {
      // Đủ thông tin → tự động đăng ký và vào luôn
      const now = new Date().toISOString();
      setUserName(pName); setUserEmail(pEmail); setRegisteredAt(now);
      const state = { userName: pName, email: pEmail, level: null, progress: {}, registeredAt: now };
      localStorage.setItem('mm-checkpoint', JSON.stringify(state));
      sendToSheets({ action: 'REGISTERED', name: pName, email: pEmail, timestamp: now });
      setScreen('onboarding');
    } else if (pName || pEmail) {
      // Có 1 trong 2 → hiện form bù thông tin
      setScreen('register');
    } else {
      // Không có gì → chặn, yêu cầu đăng ký qua LadiPage
      setScreen('gate');
    }
  }, []);

  // Save state
  const saveState = (updates={}) => {
    const state = { userName: updates.userName||userName, email: updates.email||userEmail, level: updates.level||level, progress: updates.progress||progress, registeredAt: updates.registeredAt||registeredAt };
    localStorage.setItem('mm-checkpoint', JSON.stringify(state));
  };

  const handleRegister = (name, email) => {
    const now = new Date().toISOString();
    setUserName(name); setUserEmail(email); setRegisteredAt(now);
    saveState({userName:name, email, registeredAt:now});
    sendToSheets({ action: 'REGISTERED', name, email, timestamp: now });
    setScreen('onboarding');
  };

  const handleLevel = (lv) => {
    setLevel(lv); saveState({level:lv}); setScreen('dashboard');
    sendToSheets({ action: 'SELECTED_LEVEL', name: userName, email: userEmail, level: lv });
  };

  const handleUpdateProgress = (p) => {
    setProgress(p); saveState({progress:p});
    // Gửi webhook khi hoàn thành 1 bài mới
    const justDone = MODULES.find(m => p[m.id]?.done && (!progress[m.id]?.done));
    if (justDone) {
      sendToSheets({ action: 'COMPLETED_MODULE', name: userName, email: userEmail, moduleId: justDone.id, moduleTitle: justDone.title, score: p[justDone.id]?.assessment });
    }
  };

  const handleViewCertificate = () => {
    const avgScore = Math.round(MODULES.reduce((a,m)=>a+(progress[m.id]?.assessment||0),0)/MODULES.length);
    sendToSheets({ action: 'COMPLETED_ALL', name: userName, email: userEmail, avgScore, level, timestamp: new Date().toISOString() });
    setScreen('certificate');
  };

  if(screen==='loading') return <div className="min-h-screen fun-bg flex items-center justify-center"><div className="text-4xl float">🐝</div></div>;
  if(screen==='gate') return <GateScreen />;
  if(screen==='register') return <Registration onSubmit={handleRegister} defaultName={urlParams.name} defaultEmail={urlParams.email} />;
  if(screen==='onboarding') return <Onboarding userName={userName} onSelect={handleLevel} />;
  if(screen==='certificate') return <Certificate userName={userName} level={level} progress={progress} registeredAt={registeredAt} onBack={()=>setScreen('dashboard')} />;
  if(screen==='module' && activeModule) return <LessonView moduleId={activeModule} level={level} progress={progress} onBack={()=>{setActiveModule(null);setScreen('dashboard');}} onUpdateProgress={handleUpdateProgress} />;

  return (
    <>
      <Dashboard progress={progress} onSelectModule={(id)=>{setActiveModule(id);setScreen('module');}} onCertificate={handleViewCertificate} userName={userName} onEditName={(name)=>{setUserName(name);saveState({userName:name});}} />
      {/* Sound toggle */}
      <button onClick={()=>{const on=SoundManager.toggleSfx();setSfxOn(on);}} className="fixed bottom-4 right-4 w-10 h-10 rounded-full bg-white shadow-lg border border-gray-200 flex items-center justify-center text-lg no-print hover:scale-110 transition">{sfxOn?'🔊':'🔇'}</button>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
